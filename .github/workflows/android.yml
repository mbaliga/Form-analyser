name: android

on:
  push:
    paths:
      - "engine/**"
      - "archery-module/**"
      - "app-android/**"
      - "*.gradle.kts"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "engine/**"
      - "archery-module/**"
      - "app-android/**"
      - "*.gradle.kts"
      - ".github/workflows/android.yml"

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # ubuntu-latest ships an Android SDK; this ensures cmdline-tools + accepted licenses
      # so AGP can fetch any missing platform/build-tools.
      - uses: android-actions/setup-android@v3
      # -PwithAndroid opts :app-android into the build (see settings.gradle.kts).
      - name: Assemble debug APK
        run: ./gradlew :app-android:assembleDebug -PwithAndroid --no-daemon
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: form-analyser-debug
          path: app-android/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
