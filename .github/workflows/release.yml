name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Assemble debug APK
        run: ./gradlew :app-android:assembleDebug -PwithAndroid --no-daemon
      - name: Rename APK to tag
        run: cp app-android/build/outputs/apk/debug/app-debug.apk "crocodyl-${GITHUB_REF_NAME}.apk"
      # Public no-login download link on the Release page (spec §9 distribution path).
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: crocodyl-*.apk
          generate_release_notes: true
