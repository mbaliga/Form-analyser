name: release

on:
  push:
    tags:
      - "v*"
  # The session's git proxy can't push tags, so releases are also dispatchable: the workflow
  # creates the tag + Release itself (softprops does both when given a tag_name).
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create (e.g. v0.4.0-hyle-approx)"
        required: true

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Assemble debug APK
        run: ./gradlew :app-android:assembleDebug -PwithAndroid --no-daemon
      - name: Resolve version name
        id: ver
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Rename APK to version
        run: cp app-android/build/outputs/apk/debug/app-debug.apk "crocodyl-${{ steps.ver.outputs.version }}.apk"
      # Public no-login download link on the Release page (spec §9 distribution path).
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: crocodyl-*.apk
          generate_release_notes: true
