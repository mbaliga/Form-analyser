name: release

on:
  push:
    tags:
      - "v*"
    # The session's git proxy can't push tags and the integration can't dispatch workflows,
    # so a `release/<version>` branch (creatable via the API) is the trigger of record: the
    # workflow derives the version from the branch name and softprops creates tag + Release.
    branches:
      - "release/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create (e.g. v0.4.0-hyle-approx)"
        required: true

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Assemble debug APK
        run: ./gradlew :app-android:assembleDebug -PwithAndroid --no-daemon
      - name: Resolve version name
        id: ver
        run: |
          RAW="${{ github.event.inputs.version || github.ref_name }}"
          echo "version=${RAW#release/}" >> "$GITHUB_OUTPUT"
      - name: Rename APK to version
        # module is :app-android, so AGP emits app-android-debug.apk — glob, don't guess
        run: cp app-android/build/outputs/apk/debug/*.apk "crocodyl-${{ steps.ver.outputs.version }}.apk"
      # Public no-login download link on the Release page (spec §9 distribution path).
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: crocodyl-*.apk
          generate_release_notes: true
