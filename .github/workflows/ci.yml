name: ci

on:
  push:
    paths:
      - "engine/**"
      - "archery-module/**"
      - "*.gradle.kts"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "engine/**"
      - "archery-module/**"
      - "*.gradle.kts"
      - ".github/workflows/ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # Self-contained: builds the engine module and the archery module together.
      - name: Test
        run: ./gradlew test --no-daemon
